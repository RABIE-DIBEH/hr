version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: hrms-db
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed_test_data.sql:/docker-entrypoint-initdb.d/2-seed.sql
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d hrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    environment:
      - DB_URL=jdbc:postgresql://database:5432/hrms_db
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-vErY_Str0ng_Loc@l_Dev_Secret_32Chars!!}
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
