spring.config.import=optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hrms_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080

# Auto-run data.sql on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT secret is required via environment variable. Length must be >= 32 chars for HS256.
jwt.secret=${JWT_SECRET}

# Email / SMTP Configuration (optional - leave blank to disable email notifications)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
