# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/hrms_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# Auto-run data.sql on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT (Production MUST override this via Env Variable. Length >= 32 chars)
jwt.secret=${JWT_SECRET:vErY_Str0ng_Loc@l_Dev_Secret_32Chars!!}
