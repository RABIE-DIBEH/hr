# Development configuration with H2 database
spring.datasource.url=jdbc:h2:mem:hrmsdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable data.sql for H2 (tables don't exist yet)
spring.sql.init.mode=never

# Server Configuration
server.port=8082

# JWT configuration
jwt.secret=dev-secret-key-for-development-only-change-in-production

# Disable flyway for dev
spring.flyway.enabled=false

# Enable actuator for dev
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.hrms=DEBUG
logging.level.org.springframework.security=DEBUG
